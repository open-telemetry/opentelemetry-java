# the benefit of this over renovate is that this also analyzes transitive dependencies
# while renovate (at least currently) only analyzes top-level dependencies
name: OSS Index dependency audit (daily)

on:
  schedule:
    - cron: "30 1 * * *" # daily at 1:30 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

        # --max-workers=1: scan-gradle-plugin is not thread-safe when tasks run in parallel.
        # Each ossIndexAudit task calls project.getAllprojects() and resolves configurations
        # at execution time; concurrent tasks racing on the same configurations cause
        # intermittent NullPointerExceptions. Running serially avoids this.
      - run: ./gradlew ossIndexAudit --max-workers=1
        id: audit
        continue-on-error: true
        env:
          SONATYPE_OSS_INDEX_USER: ${{ secrets.SONATYPE_OSS_INDEX_USER }}
          SONATYPE_OSS_INDEX_PASSWORD: ${{ secrets.SONATYPE_OSS_INDEX_PASSWORD }}
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

      - name: Print vulnerability report
        if: steps.audit.outcome == 'failure'
        run: |
          echo "=== OSS Index Vulnerability Report ==="
          find . -name "oss-index-cyclonedx-bom.json" | xargs cat
          exit 1

  workflow-notification:
    permissions:
      contents: read
      issues: write
    needs:
      - analyze
    if: always()
    uses: ./.github/workflows/reusable-workflow-notification.yml
    with:
      success: ${{ needs.analyze.result == 'success' }}
