# the benefit of this over renovate is that this also analyzes transitive dependencies
# while renovate (at least currently) only analyzes top-level dependencies
name: Sonatype Guide dependency audit (daily)

on:
  schedule:
    - cron: "30 1 * * *" # daily at 1:30 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    if: github.repository == 'open-telemetry/opentelemetry-java'
    environment: protected
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # --no-parallel is needed to avoid OverlappingFileLockException on the shared OSS Index cache
      - run: ./gradlew ossIndexAudit --no-configuration-cache --no-parallel --info
        id: audit
        continue-on-error: true
        env:
          SONATYPE_GUIDE_PAT: ${{ secrets.SONATYPE_GUIDE_PAT }}
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

      - name: Print vulnerability report
        if: steps.audit.outcome == 'failure'
        run: |
          echo "=== Sonatype Guide Vulnerability Report ==="
          find . -name "oss-index-cyclonedx-bom.json" | xargs cat
          exit 1

  workflow-notification:
    permissions:
      issues: write
    needs:
      - analyze
    if: always()
    uses: open-telemetry/shared-workflows/.github/workflows/workflow-failure-issue.yml@62d5939b47144252763c5ff9fffe8c20d76cd806 # v0.4.0
    with:
      success: ${{ needs.analyze.result == 'success' }}
