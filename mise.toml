[tools]

# Linters
actionlint = "1.7.12"
"aqua:owenlamont/ryl" = "0.7.0"
biome = "2.4.13"
editorconfig-checker = "3.6.1"
"github:google/google-java-format" = "1.35.0"
"github:grafana/flint" = "0.20.4"
"github:jonwiggins/xmloxide" = "0.4.2"
"github:koalaman/shellcheck" = "0.11.0"
ktlint = "1.8.0"
lychee = "0.23.0"
"pipx:codespell" = "2.4.2"
rumdl = "0.1.83"
shfmt = "3.13.1"
taplo = "0.10.0"

[settings]
# Only install tools explicitly defined in the [tools] section above
idiomatic_version_file_enable_tools = []

# Windows configuration for file-based tasks
# Based on: https://github.com/jdx/mise/discussions/4461
windows_executable_extensions = ["sh"]
windows_default_file_shell_args = "bash"
use_file_shell_for_executable_tasks = true

[tasks.lint]
description = "Run link checks"
raw_args = true
run = "flint run lychee"

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = "flint run --fix"

[env]
FLINT_CONFIG_DIR = ".github/config"
